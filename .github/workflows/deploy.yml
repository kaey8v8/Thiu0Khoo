name: Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Debug Environment Variables
      env:
        MY_URL: ${{ vars.SUPABASE_URL }}
      run: |
        # 這行會檢查你的變數長度是否為 0
        if [ -z "$MY_URL" ]; then
          echo "❌ 錯誤：GitHub Actions 完全讀不到你的 vars.SUPABASE_URL，請檢查 GitHub Settings 變數有沒有填對！"
          exit 1
        else
          echo "✅ 成功讀到變數，長度為: ${#MY_URL}"
        fi
