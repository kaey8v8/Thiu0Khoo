name: Build and Deploy

on:
  push:
    branches: [ "main" ]

# 賦予發布 GitHub Pages 的權限
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Inject Supabase Keys into Config JS
      env:
        MY_URL: ${{ vars.SUPABASE_URL }}
        MY_KEY: ${{ vars.SUPABASE_ANON_KEY }}
      run: |
        # 進行字串取代
        find . -name "supabase-config.js" -exec sed -i "s#__SUPABASE_URL__#$MY_URL#g" {} +
        find . -name "supabase-config.js" -exec sed -i "s#__SUPABASE_ANON_KEY__#$MY_KEY#g" {} +
        
        echo "=== 驗證虛擬機內檔案已修改 ==="
        head -n 5 ./supabase-config.js

    # 將目前修改完的所有檔案打包上傳
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    # 真正把剛剛打包的產物發布上線
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
