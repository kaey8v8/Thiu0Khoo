name: Build and Deploy

on:
  push:
    branches: [ "main" ]

# 賦予發布 GitHub Pages 的權限
permissions:
  contents: read
  pages: write
  id-token: write

# 避免重複部署的衝突設定
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 🌟 修正點：必須在這裡指定部署環境，GitHub 才會允許 deploy-pages 動作執行！
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Inject Supabase Keys into Config JS
      env:
        MY_URL: ${{ vars.SUPABASE_URL }}
        MY_KEY: ${{ vars.SUPABASE_ANON_KEY }}
      run: |
        find . -name "supabase-config.js" -exec sed -i "s#\__SUPABASE_URL__#$MY_URL#g" {} +
        find . -name "supabase-config.js" -exec sed -i "s#\__SUPABASE_ANON_KEY__#$MY_KEY#g" {} +

    # 將修改完、帶有真實金鑰的專案資料夾打包
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    # 正式把打包好的檔案部署到 GitHub Pages
    - name: Deploy to GitHub Pages
      id: deployment # 加上 id 讓上方 environment.url 可以抓到正式網址
      uses: actions/deploy-pages@v4
