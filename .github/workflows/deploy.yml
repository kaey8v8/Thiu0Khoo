name: Build and Deploy

on:
  push:
    branches: [ "main" ]

# 🌟 關鍵：必須賦予這個工作流發布 GitHub Pages 的權限
permissions:
  contents: read
  pages: write
  id-token: write

# 避免重複部署的衝突設定
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Inject Supabase Keys into Config JS
      env:
        MY_URL: ${{ vars.SUPABASE_URL }}
        MY_KEY: ${{ vars.SUPABASE_ANON_KEY }}
      run: |
        find . -name "supabase-config.js" -exec sed -i "s#\__SUPABASE_URL__#$MY_URL#g" {} +
        find . -name "supabase-config.js" -exec sed -i "s#\__SUPABASE_ANON_KEY__#$MY_KEY#g" {} +

    # 🌟 步驟 A：將剛剛修改完、帶有真實金鑰的專案資料夾打包（準備上傳）
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.' # 意思是打包目前所在的根目錄（包含 index.html, admin.html, supabase-config.js）

    # 🌟 步驟 B：正式把打包好的檔案部署到 GitHub Pages 伺服器
    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
