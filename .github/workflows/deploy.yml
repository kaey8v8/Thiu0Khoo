name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 當推送到 main 分支時觸發

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject Secrets into HTML
        run: |
             # 替換 index.html 金鑰
             sed -i 's|INSERT_SUPABASE_URL_HERE|${{ secrets.SUPABASE_URL }}|g' index.html
             sed -i 's|INSERT_SUPABASE_ANON_KEY_HERE|${{ secrets.SUPABASE_ANON_KEY }}|g' index.html
             
             # 替換 admin.html 金鑰
             sed -i 's|INSERT_SUPABASE_URL_HERE|${{ secrets.SUPABASE_URL }}|g' admin.html
             sed -i 's|INSERT_SUPABASE_ANON_KEY_HERE|${{ secrets.SUPABASE_ANON_KEY }}|g' admin.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 部署根目錄下的所有檔案

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
